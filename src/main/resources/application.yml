server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: gramgo

  # ── MySQL ─────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/vehicle_rental_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:@navii27}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  # ── MongoDB ───────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
    mongodb:
      uri: mongodb://localhost:27017/vehicle_rental_logs
      auto-index-creation: true
      # If MongoDB is not running, the app will still start (graceful degradation)
      # To disable MongoDB entirely, change to: spring.autoconfigure.exclude

  # ── Mail (SMTP) ───────────────────────────────────────────────────────────
  # REQUIRED for OTP emails. Set these environment variables before starting:
  #   Windows CMD:   set MAIL_USERNAME=yourname@gmail.com
  #                  set MAIL_PASSWORD=xxxx xxxx xxxx xxxx
  #   PowerShell:    $env:MAIL_USERNAME="yourname@gmail.com"
  #                  $env:MAIL_PASSWORD="xxxx xxxx xxxx xxxx"
  #
  # Get Gmail App Password: Google Account → Security → 2-Step Verification → App Passwords
  # Select "Mail" + "Other (Custom name)" → generate → copy 16-char password
  #
  # ⚠️  Replace the defaults below with your real values if you don't use env vars:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:naveetha2703@gmail.com}
    password: ${MAIL_PASSWORD:kvkdnpmxumnqwpdn}
    default-encoding: UTF-8
    test-connection: false
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  # ── File Upload ───────────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ── JWT ───────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-a-long-random-string-32chars-min}
  expiration: 900000
  refresh-expiration: 604800000
  issuer: gramgo

security:
  login:
    max-failed-attempts: 5
    lock-minutes: 30
  otp:
    ttl-minutes: 10
    resend-window-seconds: 60

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_REPLACE_WITH_YOUR_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET:REPLACE_WITH_YOUR_KEY_SECRET}
  currency: ${RAZORPAY_CURRENCY:INR}
  # ── How to get Razorpay keys ──────────────────────────────────────────────
  # 1. Sign up at https://razorpay.com
  # 2. Go to Dashboard → Settings → API Keys
  # 3. Generate Test Keys (for development) or Live Keys (for production)
  # 4. Set environment variables before starting Spring Boot:
  #    Windows CMD:   set RAZORPAY_KEY_ID=rzp_test_xxxx
  #                   set RAZORPAY_KEY_SECRET=xxxx
  #    PowerShell:    $env:RAZORPAY_KEY_ID="rzp_test_xxxx"
  #                   $env:RAZORPAY_KEY_SECRET="xxxx"
  # 5. OR replace the defaults above directly (not recommended for production)

# ── App ───────────────────────────────────────────────────────────────────
app:
  upload:
    dir: uploads
    base-url: http://localhost:8080
  frontend:
    url: http://localhost:3000

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    com.eventbooking: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/gramgo.log

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

